name: Benchmark result
description: Record a Gemma/TTS benchmark result
title: "BENCH: "
labels: ["type:research", "risk:performance"]
body:
  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: "GPU/CPU/RAM/OS"
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Model/config
      description: Model, quantization, context, voice, sample rate, codec
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Results
      description: TTFT, tokens/sec, TTS ms, encode ms, total ms, memory
    validations:
      required: true
