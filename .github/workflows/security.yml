name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 10 * * 1"

jobs:
  python-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: python -m pip install --upgrade pip pip-audit bandit
      - name: pip-audit
        run: |
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; else echo "No requirements.txt"; fi
      - name: bandit
        run: |
          if [ -d app ]; then bandit -r app; else echo "No app directory"; fi
